services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'



  pulsar:
    image: apachepulsar/pulsar:latest
    restart: on-failure
    environment:
      - PULSAR_MEM=-Xms256m -Xmx256m
    command: >
      bash -c "echo 'advertisedAddress=localhost' >> /pulsar/conf/standalone.conf &&
               bin/pulsar standalone"
    ports:
      - "6650:6650"
      - "8081:8080"
    healthcheck:
      test: [ "CMD-SHELL", "bin/pulsar-client produce test-topic --messages 'health' 2>/dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

